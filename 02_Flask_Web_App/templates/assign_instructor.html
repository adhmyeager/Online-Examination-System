{% extends "layout.html" %}
{% block title %}Assign Instructor{% endblock %}
{% block main %}
<div class="row"><div class="col-md-8 mx-auto">
<h1 class="mb-4"><i class="fas fa-link"></i> Assign Instructor to Course</h1>
<a href="/manager/instructors" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
<div class="card"><div class="card-body">
<form method="post">
    <div class="mb-3">
        <label>Instructor <span class="text-danger">*</span></label>
        <select class="form-select" name="instructor_id" required>
            <option value="">-- Select Instructor --</option>
            {% for instructor in instructors %}<option value="{{ instructor.instructor_id }}">{{ instructor.instructor_name }}</option>{% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Course <span class="text-danger">*</span></label>
        <select class="form-select" name="course_id" required>
            <option value="">-- Select Course --</option>
            {% for course in courses %}<option value="{{ course.course_id }}">{{ course.course_name }}</option>{% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Intake <span class="text-danger">*</span></label>
        <select class="form-select" name="intake_id" required>
            <option value="">-- Select Intake --</option>
            {% for intake in intakes %}<option value="{{ intake.intake_id }}">{{ intake.intake_name }} ({{ intake.intake_year }})</option>{% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Assign</button>
</form>
</div></div>
</div></div>
{% endblock %}
